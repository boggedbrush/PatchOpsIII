name: Windows Build

on:
  push:
    branches:
      - Testing
      - testing
  pull_request:
    branches:
      - Testing
      - testing
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and scan
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      ref:
        description: Git ref to build
        required: false
        type: string
        default: ''
    outputs:
      hash:
        description: SHA256 hash of the Windows zip
        value: ${{ jobs.build-windows.outputs.hash }}
      vt_url:
        description: VirusTotal URL for the Windows zip
        value: ${{ jobs.build-windows.outputs.vt_url }}
      artifact_name:
        description: Name of the produced artifact
        value: ${{ jobs.build-windows.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Electron zip
    runs-on: windows-latest
    outputs:
      hash: ${{ steps.compute_hash.outputs.hash }}
      vt_url: ${{ steps.compute_hash.outputs.vt_url }}
      artifact_name: PatchOpsIII-windows
    defaults:
      run:
        shell: pwsh
        working-directory: .
    env:
      BUN_VERSION: "1.3.13"
      ELECTRON_VERSION: "31.7.7"
      ELECTRON_BUILDER_VERSION: "26.8.1"
      PYTHON_VERSION: "3.12"
      PYINSTALLER_VERSION: "6.20.0"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      WINDOWS_PACKAGE: dist\packages\PatchOpsIII.zip
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      VT_CLI_ARCHIVE: vt-cli-latest.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: windows-electron-${{ runner.arch }}-${{ env.ELECTRON_VERSION }}
          restore-keys: |
            windows-electron-${{ runner.arch }}-
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: windows-electron-builder-${{ runner.arch }}-${{ env.ELECTRON_BUILDER_VERSION }}-${{ env.ELECTRON_VERSION }}
          restore-keys: |
            windows-electron-builder-${{ runner.arch }}-${{ env.ELECTRON_BUILDER_VERSION }}-
            windows-electron-builder-${{ runner.arch }}-
      - name: Cache Python virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: windows-venv-${{ runner.arch }}-${{ env.PYTHON_VERSION }}-${{ env.PYINSTALLER_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            windows-venv-${{ runner.arch }}-${{ env.PYTHON_VERSION }}-
      - name: Install Python backend dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install -U pip
          .\.venv\Scripts\python -m pip install -r requirements.txt
          .\.venv\Scripts\python -m pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}
      - name: Install Electron dependencies
        run: bun install --frozen-lockfile
      - name: Build Windows zip
        run: bun run dist:win
      - name: Ensure zip exists
        run: |
          if (-not (Test-Path $env:WINDOWS_PACKAGE)) {
            Get-ChildItem -Recurse dist | ForEach-Object { $_.FullName }
            throw "$env:WINDOWS_PACKAGE was not produced"
          }
      - name: Compute Windows hash
        id: compute_hash
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -Path $env:WINDOWS_PACKAGE).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path (Split-Path $env:WINDOWS_PACKAGE) 'hash.log') -Value $hash
          $vtUrl = "https://www.virustotal.com/gui/file/$hash"
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "vt_url=$vtUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Determine VirusTotal CLI release
        id: vt_release
        if: ${{ env.VT_API_KEY != '' }}
        run: |
          $release = Invoke-RestMethod -Uri https://api.github.com/repos/VirusTotal/vt-cli/releases/latest
          $tag = $release.tag_name
          if (-not $tag) {
            throw 'Release tag missing from VirusTotal CLI metadata'
          }
          $asset = $release.assets | Where-Object { $_.name -eq 'Windows64.zip' } | Select-Object -First 1
          if (-not $asset) {
            throw 'Windows64.zip asset not found in VirusTotal CLI release metadata'
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "url=$($asset.browser_download_url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Cache VirusTotal CLI
        id: cache-vt
        if: ${{ env.VT_API_KEY != '' }}
        uses: actions/cache@v4
        with:
          path: |
            vt.exe
            ${{ env.VT_CLI_ARCHIVE }}
          key: vt-${{ runner.os }}-${{ steps.vt_release.outputs.tag }}
      - name: Download VirusTotal CLI
        if: ${{ env.VT_API_KEY != '' && steps.cache-vt.outputs.cache-hit != 'true' }}
        run: |
          Invoke-WebRequest -Uri '${{ steps.vt_release.outputs.url }}' -OutFile $env:VT_CLI_ARCHIVE
          Expand-Archive -Path $env:VT_CLI_ARCHIVE -DestinationPath . -Force
      - name: Ensure VirusTotal CLI executable
        if: ${{ env.VT_API_KEY != '' }}
        run: |
          if (-not (Test-Path 'vt.exe')) {
            throw 'VirusTotal CLI binary vt.exe not found'
          }
      - name: VirusTotal scan
        if: ${{ env.VT_API_KEY != '' }}
        run: .\vt.exe scan file $env:WINDOWS_PACKAGE --apikey $env:VT_API_KEY
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PatchOpsIII-windows
          path: |
            dist/packages/PatchOpsIII.zip
            dist/packages/hash.log
          if-no-files-found: error
