name: Windows Build

on:
  push:
    branches:
      - Testing
      - testing
  pull_request:
    branches:
      - Testing
      - testing
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build
        required: false
        type: string
        default: ''
    outputs:
      hash:
        description: SHA256 hash of the Windows executable
        value: ${{ jobs.build-windows.outputs.hash }}
      vt_url:
        description: VirusTotal URL for the Windows executable
        value: ${{ jobs.build-windows.outputs.vt_url }}
      artifact_name:
        description: Name of the produced artifact
        value: ${{ jobs.build-windows.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Electron executable
    runs-on: windows-latest
    outputs:
      hash: ${{ steps.compute_hash.outputs.hash }}
      vt_url: ${{ steps.compute_hash.outputs.vt_url }}
      artifact_name: PatchOpsIII-windows
    defaults:
      run:
        shell: pwsh
        working-directory: .
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      WINDOWS_BINARY: dist\packages\PatchOpsIII.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install Python backend dependencies
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install -U pip
          .\.venv\Scripts\python -m pip install -r requirements.txt
          .\.venv\Scripts\python -m pip install -U pyinstaller
      - name: Install Electron dependencies
        run: bun install --frozen-lockfile
      - name: Build portable Electron executable
        run: bun run dist:win
      - name: Ensure executable exists
        run: |
          if (-not (Test-Path $env:WINDOWS_BINARY)) {
            Get-ChildItem -Recurse dist | ForEach-Object { $_.FullName }
            throw "$env:WINDOWS_BINARY was not produced"
          }
      - name: Compute Windows hash
        id: compute_hash
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -Path $env:WINDOWS_BINARY).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path (Split-Path $env:WINDOWS_BINARY) 'hash.log') -Value $hash
          $vtUrl = "https://www.virustotal.com/gui/file/$hash"
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "vt_url=$vtUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PatchOpsIII-windows
          path: |
            dist/packages/PatchOpsIII.exe
            dist/packages/hash.log
          if-no-files-found: error
